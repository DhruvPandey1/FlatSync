version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: flatsync_db_staging
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-practice}
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: runner
    container_name: flatsync_backend_staging
    environment:
      - DB_USER=${DB_USER:-postgres}
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-practice}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_PORT=5432
      - NODE_ENV=production
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: runner
    container_name: flatsync_frontend_staging
    environment:
      - NODE_ENV=production
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata_staging:
