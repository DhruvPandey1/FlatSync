version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: flatsync_db_dev
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-Dhruvpgsql1}
      POSTGRES_DB: ${DB_NAME:-practice}
    ports:
      - "5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      target: builder
    container_name: flatsync_backend_dev
    environment:
      - DB_USER=${DB_USER:-postgres}
      - DB_HOST=db
      - DB_NAME=${DB_NAME:-practice}
      - DB_PASSWORD=${DB_PASSWORD:-Dhruvpgsql1}
      - DB_PORT=5432
      - FRONTEND_URL=http://localhost:3000
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      target: builder
    container_name: flatsync_frontend_dev
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

volumes:
  pgdata_dev:
